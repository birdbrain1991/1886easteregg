<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1886 — Easter Egg</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #000;
  font-family: 'IM Fell English', serif;
}
canvas { position: fixed; inset: 0; z-index: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
try {
  var cvs = document.getElementById('c');
  var rdr = new THREE.WebGLRenderer({ canvas: cvs, antialias: true });
  rdr.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  rdr.setSize(window.innerWidth, window.innerHeight);

  var sc = new THREE.Scene();

  // ── GRADIENT BACKGROUND — black bottom, deep violet top ──
  // Using a fullscreen quad with vertex colors
  var bgGeo = new THREE.PlaneGeometry(2, 2);
  var bgMat = new THREE.ShaderMaterial({
    depthWrite: false,
    uniforms: {},
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position.xy, 1.0, 1.0);
      }
    `,
    fragmentShader: `
      varying vec2 vUv;
      void main() {
        vec3 bottom = vec3(0.0, 0.0, 0.0);
        vec3 top = vec3(0.12, 0.04, 0.22);
        vec3 col = mix(bottom, top, pow(vUv.y, 0.7));
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
  var bgMesh = new THREE.Mesh(bgGeo, bgMat);
  bgMesh.frustumCulled = false;
  sc.add(bgMesh);

  var cam = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  cam.position.set(0, 0, 14);

  window.addEventListener('resize', function() {
    cam.aspect = window.innerWidth / window.innerHeight;
    cam.updateProjectionMatrix();
    rdr.setSize(window.innerWidth, window.innerHeight);
  });

  // ── LIGHTS ──
  sc.add(new THREE.AmbientLight(0x1a0a2e, 3.0));
  var sun = new THREE.DirectionalLight(0xfff4e0, 2.5);
  sun.position.set(-8, 4, 6);
  sc.add(sun);
  var rimLight = new THREE.DirectionalLight(0x3a1060, 1.2);
  rimLight.position.set(8, -2, -4);
  sc.add(rimLight);

  // ── STARS — pulsing dots with varying brightness ──
  var starCount = 120;
  var starPositions = new Float32Array(starCount * 3);
  var starSizes = new Float32Array(starCount);
  var starPhases = new Float32Array(starCount);
  var starBrightness = new Float32Array(starCount);

  for (var i = 0; i < starCount; i++) {
    starPositions[i*3]   = (Math.random() - 0.5) * 80;
    starPositions[i*3+1] = (Math.random() - 0.5) * 60;
    starPositions[i*3+2] = (Math.random() - 0.5) * 40 - 10;
    starSizes[i] = 0.5 + Math.random() * 2.5;
    starPhases[i] = Math.random() * Math.PI * 2;
    starBrightness[i] = 0.3 + Math.random() * 0.7;
  }

  var starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
  starGeo.setAttribute('phase', new THREE.BufferAttribute(starPhases, 1));
  starGeo.setAttribute('brightness', new THREE.BufferAttribute(starBrightness, 1));

  var starMat = new THREE.ShaderMaterial({
    transparent: true,
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute float size;
      attribute float phase;
      attribute float brightness;
      uniform float uTime;
      varying float vAlpha;
      void main() {
        float pulse = 0.6 + 0.4 * sin(uTime * 1.2 + phase);
        vAlpha = brightness * pulse;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (300.0 / -mvPos.z);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - vec2(0.5));
        if (d > 0.5) discard;
        float alpha = (1.0 - d * 2.0) * vAlpha;
        gl_FragColor = vec4(0.9, 0.88, 1.0, alpha);
      }
    `
  });

  sc.add(new THREE.Points(starGeo, starMat));

  // ── PLANETS ──
  function makePlanet(x, y, z, radius, colorTop, colorBottom, ringColor) {
    var g = new THREE.Group();

    // Planet sphere with shader for gradient look
    var geo = new THREE.SphereGeometry(radius, 48, 32);
    var mat = new THREE.ShaderMaterial({
      uniforms: {
        uColorA: { value: new THREE.Color(colorTop) },
        uColorB: { value: new THREE.Color(colorBottom) },
        uLightDir: { value: new THREE.Vector3(-0.8, 0.4, 0.6).normalize() },
        uRimColor: { value: new THREE.Color(0x3a1060) }
      },
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          vPosition = position;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 uColorA;
        uniform vec3 uColorB;
        uniform vec3 uLightDir;
        uniform vec3 uRimColor;
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
          // Base gradient by Y
          float t = vPosition.y / (length(vPosition) * 2.0) + 0.5;
          vec3 base = mix(uColorB, uColorA, t);
          // Diffuse lighting
          float diff = max(dot(vNormal, uLightDir), 0.0);
          float ambient = 0.18;
          // Rim light
          vec3 viewDir = normalize(vec3(0.0, 0.0, 1.0));
          float rim = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 3.0);
          vec3 col = base * (ambient + diff * 0.82) + uRimColor * rim * 0.5;
          gl_FragColor = vec4(col, 1.0);
        }
      `
    });

    var sphere = new THREE.Mesh(geo, mat);
    g.add(sphere);

    // Subtle atmosphere glow
    var atmGeo = new THREE.SphereGeometry(radius * 1.08, 32, 24);
    var atmMat = new THREE.ShaderMaterial({
      transparent: true,
      side: THREE.FrontSide,
      uniforms: { uColor: { value: new THREE.Color(colorTop) } },
      vertexShader: `
        varying vec3 vNormal;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 uColor;
        varying vec3 vNormal;
        void main() {
          vec3 viewDir = normalize(vec3(0.0, 0.0, 1.0));
          float rim = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 4.0);
          gl_FragColor = vec4(uColor, rim * 0.35);
        }
      `
    });
    g.add(new THREE.Mesh(atmGeo, atmMat));

    g.position.set(x, y, z);
    sc.add(g);
    return g;
  }

  // Three planets — small far, medium mid, large close
  var planet1 = makePlanet(-13.0, 3.5, -12, 0.7,  0x2a4a7a, 0x0a1a3a);  // small, blue-grey, far
  var planet2 = makePlanet( 13.0,  1.0, -12, 1.2, 0x5a2a6a, 0x1a0a2a);  // medium, purple, mid
  var planet3 = makePlanet( 8.0,  4.5, -12, 1.6, 0x4a7a9a, 0x0a1a2a);  // large, green-grey, close


  // ── RIFT & TENTACLES ──
  var riftGroup = new THREE.Group();
  riftGroup.position.set(0, 0, 0);
  sc.add(riftGroup);

  // Rift — glowing elliptical tear in space
  var riftMat = new THREE.ShaderMaterial({
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false,
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
    `,
    fragmentShader: `
      uniform float uTime;
      varying vec2 vUv;
      void main() {
        vec2 c = vUv - 0.5;
        c.x *= 2.5;
        float d = length(c);
        float rim = smoothstep(0.5, 0.35, d) * smoothstep(0.1, 0.32, d);
        float inner = smoothstep(0.32, 0.0, d);
        // Animated flicker
        float flicker = 0.8 + 0.2 * sin(uTime * 3.1 + d * 12.0);
        vec3 rimCol = mix(vec3(0.15, 0.0, 0.25), vec3(0.45, 0.1, 0.6), rim) * flicker;
        vec3 innerCol = vec3(0.02, 0.0, 0.05);
        vec3 col = mix(rimCol, innerCol, inner);
        float alpha = rim * 0.9 + inner * 0.95;
        gl_FragColor = vec4(col, alpha * flicker);
      }
    `
  });
  var riftMesh = new THREE.Mesh(new THREE.PlaneGeometry(10.0, 6.5, 1, 1), riftMat);
  riftGroup.add(riftMesh);

  // Glow halo behind rift
  var haloMat = new THREE.ShaderMaterial({
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false,
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
    `,
    fragmentShader: `
      uniform float uTime;
      varying vec2 vUv;
      void main() {
        vec2 c = vUv - 0.5;
        c.x *= 2.0;
        float d = length(c);
        float pulse = 0.7 + 0.3 * sin(uTime * 1.8);
        float glow = smoothstep(0.8, 0.0, d) * 0.18 * pulse;
        gl_FragColor = vec4(0.2, 0.0, 0.4, glow);
      }
    `
  });
  var haloMesh = new THREE.Mesh(new THREE.PlaneGeometry(20.0, 14.0), haloMat);
  haloMesh.position.z = -0.05;
  riftGroup.add(haloMesh);

  // ── TENTACLES ──
  var tentacles = [];
  var tentMat = new THREE.ShaderMaterial({
    transparent: true, side: THREE.DoubleSide, depthWrite: false,
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      varying float vT; varying vec3 vNormal; varying vec3 vPos;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vT = uv.x; vPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      uniform float uTime;
      varying float vT; varying vec3 vNormal; varying vec3 vPos;
      void main() {
        // Sharp tip — hard cutoff
        float alpha = smoothstep(0.0, 0.25, vT) * 0.97;
        // Color: glows purple at base, near-black at tip
        vec3 col = mix(vec3(0.03, 0.0, 0.06), vec3(0.55, 0.05, 0.95), pow(vT, 0.7));
        // Rim glow
        vec3 view = vec3(0.0, 0.0, 1.0);
        float rim = pow(1.0 - abs(dot(vNormal, view)), 2.2);
        col += vec3(0.35, 0.0, 0.6) * rim * (vT * 0.8 + 0.2);
        // Dendrite surface detail
        float d = sin(vPos.x * 30.0 + uTime) * cos(vPos.y * 24.0 - uTime * 0.7) * sin(vPos.z * 20.0);
        col += vec3(0.25, 0.0, 0.45) * max(0.0, d * 0.12 * (1.0 - vT));
        gl_FragColor = vec4(col, alpha);
      }`
  });

  var branchMat = new THREE.ShaderMaterial({
    transparent: true, side: THREE.DoubleSide, depthWrite: false,
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      varying float vT; varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal); vT = uv.x;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      uniform float uTime;
      varying float vT; varying vec3 vNormal;
      void main() {
        float alpha = smoothstep(0.0, 0.25, vT) * 0.95;
        vec3 col = mix(vec3(0.03, 0.0, 0.06), vec3(0.55, 0.05, 0.95), pow(vT, 0.7));
        vec3 view = vec3(0.0, 0.0, 1.0);
        float rim = pow(1.0 - abs(dot(vNormal, view)), 2.0);
        col += vec3(0.35, 0.0, 0.6) * rim * (vT * 0.8 + 0.2);
        gl_FragColor = vec4(col, alpha);
      }`
  });

  var TENT_ANGLES = [Math.PI * 0.5, Math.PI * 1.17, Math.PI * 1.83];
  var TENT_LENGTHS = [7.0, 7.0, 7.0];
  var TENT_THICK = [0.22, 0.18, 0.20];
  var TENT_SPEED = [0.6, 0.72, 0.68];
  var TENT_WAV = [0.22, 0.32, 0.30];
  var TENT_SPREAD = [0.12, 0.05, 0.05];
  var SEG = 56;

  for (var ti = 0; ti < 3; ti++) {
    var pts = [];
    for (var s = 0; s <= SEG; s++) pts.push(new THREE.Vector3());
    var curve = new THREE.CatmullRomCurve3(pts);
    var geo = new THREE.TubeGeometry(curve, SEG, TENT_THICK[ti], 12, false);
    var mesh = new THREE.Mesh(geo, tentMat);
    riftGroup.add(mesh);

    // 3 dendrite branches per tentacle
    var branches = [];
    for (var bi = 0; bi < 3; bi++) {
      var bPts = [new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()];
      var bMesh = new THREE.Mesh(
        new THREE.TubeGeometry(new THREE.CatmullRomCurve3(bPts), 10, TENT_THICK[ti]*0.2, 6, false),
        branchMat
      );
      riftGroup.add(bMesh);
      var subBranches = [];
      for (var sbi = 0; sbi < 2; sbi++) {
        var sbPts = [new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()];
        var sbMesh = new THREE.Mesh(
          new THREE.TubeGeometry(new THREE.CatmullRomCurve3(sbPts), 8, TENT_THICK[ti]*0.07, 5, false),
          branchMat
        );
        riftGroup.add(sbMesh);
        subBranches.push({ mesh: sbMesh, frac: 0.3 + sbi * 0.4, side: sbi % 2 === 0 ? 1 : -1 });
      }
      branches.push({ mesh: bMesh, frac: 0.25 + bi * 0.22, side: bi % 2 === 0 ? 1 : -1, subBranches: subBranches });
    }
    tentacles.push({ mesh, pts, branches,
      angle: TENT_ANGLES[ti], len: TENT_LENGTHS[ti],
      thick: TENT_THICK[ti], spd: TENT_SPEED[ti], wav: TENT_WAV[ti], spreadFactor: TENT_SPREAD[ti] });
  }

  function updateTentacles(t) {
    tentacles.forEach(function(tent, ti) {
      var a = tent.angle;
      var dirX = Math.cos(a), dirY = Math.sin(a) * 0.55;
      var perpX = -Math.sin(a), perpY = Math.cos(a) * 0.55;

      // All start from exact center (0,0,0)
      tent.pts[0].set(0, 0, 0);
      for (var s = 1; s <= SEG; s++) {
        var f = s / SEG;
        var spread = f * tent.len * tent.spreadFactor;
        var fwd = f * tent.len * 1.85;
        // Swaying: always perpendicular to forward direction in screen plane
        var sway = Math.sin(t * tent.spd + f * 5.5 + ti * 2.3) * tent.wav * Math.sqrt(f);
        var sway2 = Math.cos(t * tent.spd * 0.75 + f * 3.8 + ti * 1.9) * tent.wav * 0.35 * Math.sqrt(f);
        // perpX/perpY always swings sideways regardless of tentacle direction
        var swayX = perpX * sway + dirX * sway2 * 0.2;
        var swayY = perpY * sway + dirY * sway2 * 0.2;
        tent.pts[s].set(dirX*spread + swayX, dirY*spread + swayY, fwd);
      }

      var nc = new THREE.CatmullRomCurve3(tent.pts);
      // Taper geometry
      var ng = new THREE.TubeGeometry(nc, SEG, tent.thick, 12, false);
      var pos = ng.attributes.position;
      var uv = ng.attributes.uv;
      for (var vi = 0; vi < pos.count; vi++) {
        var uvx = uv.getX(vi);
        var taper = Math.pow(1.0 - uvx, 0.55);
        var cp = nc.getPoint(uvx);
        pos.setXYZ(vi,
          cp.x + (pos.getX(vi) - cp.x) * taper,
          cp.y + (pos.getY(vi) - cp.y) * taper,
          cp.z + (pos.getZ(vi) - cp.z) * taper
        );
      }
      pos.needsUpdate = true;
      ng.computeVertexNormals();
      tent.mesh.geometry.dispose();
      tent.mesh.geometry = ng;

      // Dendrite branches with sub-branches and tapered tips
      tent.branches.forEach(function(br, bi) {
        var f2 = br.frac;
        var bp = nc.getPoint(f2);
        var tan = nc.getTangent(f2);
        var perp = new THREE.Vector3(-tan.y, tan.x, 0).normalize();
        var bLen = tent.len * 0.22;
        var bw = Math.sin(t * tent.spd * 1.5 + bi * 2.1 + ti * 1.3) * 0.08;
        var mid = bp.clone().addScaledVector(perp, bLen * 0.5 * br.side + bw);
        var tip = bp.clone().addScaledVector(perp, bLen * br.side).addScaledVector(tan, bLen * 0.45);
        var bc = new THREE.CatmullRomCurve3([bp, mid, tip]);

        // Tapered branch geometry
        var bSeg = 12;
        var bg = new THREE.TubeGeometry(bc, bSeg, tent.thick * 0.18, 6, false);
        var bPos = bg.attributes.position;
        var bUv = bg.attributes.uv;
        for (var bvi = 0; bvi < bPos.count; bvi++) {
          var buvx = bUv.getX(bvi);
          var btaper = Math.pow(1.0 - buvx, 0.5);
          var bcp = bc.getPoint(buvx);
          bPos.setXYZ(bvi,
            bcp.x + (bPos.getX(bvi) - bcp.x) * btaper,
            bcp.y + (bPos.getY(bvi) - bcp.y) * btaper,
            bcp.z + (bPos.getZ(bvi) - bcp.z) * btaper
          );
        }
        bPos.needsUpdate = true;
        bg.computeVertexNormals();
        br.mesh.geometry.dispose();
        br.mesh.geometry = bg;

        // Sub-branches off this branch
        br.subBranches.forEach(function(sb, sbi) {
          var sf = sb.frac;
          var sbp = bc.getPoint(sf);
          var stan = bc.getTangent(sf);
          var sperp = new THREE.Vector3(-stan.y, stan.x, stan.z * 0.3).normalize();
          var sLen = bLen * 0.4;
          var sw = Math.sin(t * tent.spd * 2.0 + sbi * 3.1 + bi * 1.7 + ti) * 0.05;
          var smid = sbp.clone().addScaledVector(sperp, sLen * 0.5 * sb.side + sw);
          var stip = sbp.clone().addScaledVector(sperp, sLen * sb.side).addScaledVector(stan, sLen * 0.5);
          var sc2 = new THREE.CatmullRomCurve3([sbp, smid, stip]);
          var sg = new THREE.TubeGeometry(sc2, 8, tent.thick * 0.07, 5, false);
          // Taper sub-branch
          var sPos = sg.attributes.position;
          var sUv = sg.attributes.uv;
          for (var svi = 0; svi < sPos.count; svi++) {
            var suvx = sUv.getX(svi);
            var staper = Math.pow(1.0 - suvx, 0.5);
            var scp = sc2.getPoint(suvx);
            sPos.setXYZ(svi,
              scp.x + (sPos.getX(svi) - scp.x) * staper,
              scp.y + (sPos.getY(svi) - scp.y) * staper,
              scp.z + (sPos.getZ(svi) - scp.z) * staper
            );
          }
          sPos.needsUpdate = true;
          sg.computeVertexNormals();
          sb.mesh.geometry.dispose();
          sb.mesh.geometry = sg;
        });
      });
    });
    tentMat.uniforms.uTime.value = t;
    branchMat.uniforms.uTime.value = t;
  }

  // ── ANIMATION ──
  var clk = new THREE.Clock();
  rdr.setAnimationLoop(function() {
    var t = clk.getElapsedTime();
    starMat.uniforms.uTime.value = t;

    // Slow planet rotation
    planet1.rotation.y = t * 0.08;
    planet2.rotation.y = t * 0.05;
    planet3.rotation.y = t * 0.03;

    // Gentle float
    planet1.position.y = 3.5 + Math.sin(t * 0.3) * 0.10;
    planet2.position.y = 1.0 + Math.sin(t * 0.2 + 1.0) * 0.14;
    planet3.position.y = 4.5 + Math.sin(t * 0.15 + 2.0) * 0.16;

    updateTentacles(t);
    riftMat.uniforms.uTime.value = t;
    haloMat.uniforms.uTime.value = t;
    rdr.render(sc, cam);
  });

} catch(e) { console.error(e); }
</script>

<div id="panel" style="
  position:fixed;
  bottom:0; left:0; right:0;
  z-index:100;
  padding: 22px 40px 28px;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 60%, transparent);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  pointer-events:none;
">
  <div style="
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: clamp(13px, 1.8vw, 20px);
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(220,185,110,0.92);
    font-weight:400;
  ">Days Until God Arrives</div>
  <div id="timer" style="
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: clamp(32px, 6vw, 72px);
    letter-spacing: 4px;
    color: rgba(220,185,110,0.92);
    font-weight:400;
    text-shadow: 0 0 30px rgba(180,80,255,0.4), 0 0 60px rgba(180,80,255,0.15);
  ">—</div>
</div>

<script>
(function() {
  var target = new Date('2027-03-15T00:00:00');
  function update() {
    var now = new Date();
    var diff = target - now;
    if (diff <= 0) {
      document.getElementById('timer').textContent = 'GOD HAS ARRIVED';
      return;
    }
    var days  = Math.floor(diff / (1000*60*60*24));
    var hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    var mins  = Math.floor((diff % (1000*60*60)) / (1000*60));
    var secs  = Math.floor((diff % (1000*60)) / 1000);
    var pad = function(n) { return n < 10 ? '0'+n : ''+n; };
    document.getElementById('timer').textContent =
      days + 'd  ' + pad(hours) + 'h  ' + pad(mins) + 'm  ' + pad(secs) + 's';
  }
  update();
  setInterval(update, 1000);
})();
</script>

</body>
</html>
